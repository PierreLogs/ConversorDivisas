name: CI
on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Compilar
        run: |
          javac -cp ".;gson-2.10.1.jar" -d out src/com/moneyexchange/principal/Principal.java
      - name: Verificar compilación
        run: |
          if (Test-Path out/) { Write-Host "Build OK" } else { exit 1 }
        shell: pwsh
