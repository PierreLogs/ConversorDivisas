name: CI
on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Descargar Gson
        run: |
          curl -sL https://repo1.maven.org/maven2/com/google/code/gson/gson/2.10.1/gson-2.10.1.jar -o gson.jar
      - name: Compilar
        run: |
          javac -cp "gson.jar" -d out $(find src -name "*.java")
      - name: Verificar compilación
        run: |
          ls out/com/moneyexchange/ && echo "Build OK"
